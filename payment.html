<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment - BloomSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <h2>BloomSphere</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="cart.html">View Cart</a></li>
        </ul>
    </div>

    <!-- Payment Section -->
    <div class="payment-container">
        <h2>Payment Information</h2>

        <form id="paymentForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Card Number</label>
                <input type="text" placeholder="1234 5678 9012 3456" maxlength="16" required>
            </div>

            <div class="form-group">
                <label>Expiry Date</label>
                <input type="month" required>
            </div>

            <div class="form-group">
                <label>CVV</label>
                <input type="password" placeholder="123" maxlength="3" required>
            </div>

            <button type="submit" class="payment-btn">Complete Payment</button>
        </form>
    </div>

    <script>
        document.getElementById("paymentForm").addEventListener("submit", function(e) {
            e.preventDefault();
            alert("Payment Successful! 🌸 Thank you for shopping with BloomSphere.");
            window.location.href = "index.html";
        });
    </script>
    
    <script src="js/script.js"></script>
    

</body>
</html>
