<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment - BloomSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <nav class="sidebar">
        <h2>BloomSphere</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="cart.html">View Cart</a></li>
        </ul>
    </nav>

    <main style="margin-left:240px; padding:40px;">
        <div class="payment-container">
            <h2>Payment Information</h2>

            <div id="totalAmount" style="margin-bottom:20px; font-size:18px;"></div>

            <form id="paymentForm">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="1234 5678 9012 3456" maxlength="16" required>
                </div>

                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="month" required>
                </div>

                <div class="form-group">
                    <label>CVV</label>
                    <input type="password" placeholder="123" maxlength="3" required>
                </div>

                <button type="submit" class="payment-btn">Complete Payment</button>

            </form>
        </div>
    </main>

    <script>
        const cart = JSON.parse(localStorage.getItem("cart")) || [];
        let total = 0;

        cart.forEach(item => {
            total += item.price * item.quantity;
        });

        document.getElementById("totalAmount").innerHTML =
            "<strong>Total Amount: Rs " + total + "</strong>";

        document.getElementById("paymentForm").addEventListener("submit", function(e) {
            e.preventDefault();

            if (cart.length === 0) {
                alert("Your cart is empty 😢");
                return;
            }

            alert("Payment Successful 🌸 Thank you for shopping with BloomSphere!");

            localStorage.removeItem("cart");

            window.location.href = "index.html";
        });
    </script>

    <script src="js/script.js"></script>

</body>
</html>
